<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>Drive Dash</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet">
  <link href="https://unpkg.com/threebox-plugin/dist/threebox.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app" aria-label="Drive dashboard">
    <div id="map" aria-label="Live map"></div>

    <section class="dash-panel speed-panel" aria-live="polite" aria-label="Current speed">
      <span id="speedValue" class="speed-value">--</span>
      <span class="speed-unit">mph</span>
    </section>

    <img id="speedLimitSign" class="speed-limit-sign hidden" src="images/speed-limit/us/blank.svg" alt="Speed limit unknown">

    <div id="statusBanner" class="status-banner hidden" role="status" aria-live="polite"></div>

    <div id="roadDisplay" class="road-display hidden" aria-live="polite"></div>

    <button id="recenterButton" class="recenter-button invisible" type="button" disabled>
      Recenter
    </button>
  </main>

  <noscript>
    <p class="noscript">Drive Dash needs JavaScript enabled to show the live map.</p>
  </noscript>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>
  <script src="https://unpkg.com/three@0.141.0/build/three.min.js"></script>
  <script src="https://unpkg.com/threebox-plugin/dist/threebox.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
